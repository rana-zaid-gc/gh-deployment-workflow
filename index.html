<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, GitHub Actions!</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; background: #0d1117; color: #e6edf3; text-align: center;
    }
    h1 { font-size: 2.5rem; color: #3fb950; }
    p { color: #8b97a7; font-size: 1.1rem; }
    code { background: #1a2330; padding: 2px 8px; border-radius: 4px; color: #58a6ff; }
  </style>
</head>
<body>
  <h1>Hello, GitHub Actions!</h1>
  <p>This page was deployed automatically to GitHub Pages by a GitHub Actions workflow.</p>
  <p>Every push that changes <code>index.html</code> redeploys this site.</p>
</body>
</html>
